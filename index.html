<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Monitor Panel</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #3b82f6; --success: #22c55e; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 2rem; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; max-width: 1200px; margin: 0 auto; }
        .card { background: var(--card); padding: 1.5rem; border-radius: 12px; box-shadow: 0 4px 6px -1px #00000040; }
        h2 { margin-top: 0; border-bottom: 2px solid #334155; padding-bottom: 0.5rem; }
        .form-group { margin-bottom: 1rem; display: flex; flex-direction: column; gap: 0.5rem; }
        input, button, select { padding: 0.75rem; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: white; font-size: 1rem; }
        button { background: var(--accent); cursor: pointer; font-weight: bold; border: none; }
        button:hover { filter: brightness(1.1); }
        .log-box { background: #090d16; padding: 1rem; border-radius: 6px; height: 250px; overflow-y: auto; font-family: monospace; font-size: 0.9rem; }
        .alert-toast { background: #3b82f6; padding: 1rem; margin-bottom: 0.5rem; border-radius: 6px; border-left: 5px solid white; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>

    <h1 style="text-align: center; margin-bottom: 2rem;">📈 Live Engine Configuration Dashboard</h1>

    <div class="grid">
        <!-- Configuration Control Card -->
        <div class="card">
            <h2>Track Engine Settings</h2>
            <div class="form-group">
                <label>Primary Ticker Target</label>
                <input type="text" id="sst" placeholder="e.g. NVDA">
            </div>
            <div class="form-group">
                <label>Secondary Ticker Target (Optional)</label>
                <input type="text" id="sst2" placeholder="e.g. SHV">
            </div>
            <div class="form-group">
                <label>Notification Trigger Percentage (%)</label>
                <input type="number" step="0.01" id="p" placeholder="e.g. 5">
            </div>
            <div class="form-group">
                <label>Alert Toggle State</label>
                <select id="enabled">
                    <option value="true">Enabled</option>
                    <option value="false">Disabled</option>
                </select>
            </div>
            <button onclick="saveSettings()">Save Configuration Engine</button>
            
            <h2 style="margin-top: 2rem;">Manual Spot Check</h2>
            <button style="background: var(--success);" onclick="spotCheckStock()">Fetch Primary Stock Metrics Now</button>
            <div id="spotCheckResult" style="margin-top: 1rem; font-weight: bold;"></div>
        </div>

        <!-- Alerts and Data Streams -->
        <div class="card">
            <h2>Real-Time Notification Stream</h2>
            <div id="liveAlerts"></div>

            <h2>Historical Event Logs (Disk)</h2>
            <div class="log-box" id="logBox">Loading files...</div>
            <button style="margin-top: 1rem; background: #475569; width: 100%;" onclick="loadLogs()">Refresh Disk Logs</button>
        </div>
    </div>

    <script>
        const API = "http://127.0.0";

        // Ask for native browser OS system-level notifications on interface loading sequence
        if (Notification.permission === "default") { Notification.requestPermission(); }

        async function loadSettings() {
            const res = await fetch(`${API}/state`);
            const data = await res.json();
            document.getElementById('sst').value = data.sst || '';
            document.getElementById('sst2').value = data.sst2 || '';
            document.getElementById('p').value = data.p;
            document.getElementById('enabled').value = data.enabled.toString();
        }

        async function saveSettings() {
            const payload = {
                sst: document.getElementById('sst').value,
                sst2: document.getElementById('sst2').value,
                p: document.getElementById('p').value,
                enabled: document.getElementById('enabled').value === "true"
            };
            await fetch(`${API}/state`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            alert("Application settings successfully saved!");
            loadLogs();
        }

        async function spotCheckStock() {
            const ticker = document.getElementById('sst').value;
            if (!ticker) return alert("Please specify a primary ticker symbol asset first.");
            
            const div = document.getElementById('spotCheckResult');
            div.innerText = "Querying Yahoo Servers...";
            
            const res = await fetch(`${API}/price/${ticker}`);
            const data = await res.json();
            if(data.error) {
                div.innerText = "Error pulling stock ticker information.";
            } else {
                div.innerText = `${data.ticker}: $${data.price} (${data.change}% Today)`;
            }
        }

        async function loadLogs() {
            const res = await fetch(`${API}/logs`);
            const data = await res.json();
            const container = document.getElementById('logBox');
            container.innerHTML = data.logs.length ? data.logs.map(l => `<div>${l}</div>`).join('') : "No logged alert data recorded yet.";
        }

        // Connect directly to backend using Server-Sent Events for instant browser alert handling
        function initEventStream() {
            const source = new EventSource(`${API}/stream`);
            source.onmessage = function(event) {
                const data = JSON.parse(event.data);
                
                // 1. Render immediate dynamic UI HTML toast banner card component 
                const alertDiv = document.createElement('div');
                alertDiv.className = 'alert-toast';
                alertDiv.innerText = data.message;
                const container = document.getElementById('liveAlerts');
                container.insertBefore(alertDiv, container.firstChild);
                setTimeout(() => alertDiv.remove(), 8000); // clear UI toast container stack after 8s

                // 2. Play basic system speaker diagnostic click-beep audio sound
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = audioCtx.createOscillator();
                osc.type = 'sine'; osc.frequency.value = 587.33; // D5 Note
                osc.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.15);

                // 3. Dispatch native Operating System banner alert display window notification
                if (Notification.permission === "granted") {
                    new Notification("Market Trigger Alert", { body: data.message });
                }
                loadLogs(); // Refresh the disk configuration logs seamlessly
            };
        }

        // Kickoff initialization sequence processes
        loadSettings();
        loadLogs();
        initEventStream();
    </script>
</body>
</html>
