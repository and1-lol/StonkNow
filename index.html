<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Monitor Panel</title>
    <style>
        :root { 
            --bg: #0f172a; 
            --card: #1e293b; 
            --text: #f8fafc; 
            --accent: #3b82f6; 
            --success: #22c55e; 
            --danger: #ef4444;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 2rem; 
        }
        h1 {
            text-align: center; 
            margin-bottom: 2rem;
        }
        .grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 2rem; 
            max-width: 1200px; 
            margin: 0 auto; 
        }
        .card { 
            background: var(--card); 
            padding: 1.5rem; 
            border-radius: 12px; 
            box-shadow: 0 4px 6px -1px #00000040; 
        }
        h2 { 
            margin-top: 0; 
            border-bottom: 2px solid #334155; 
            padding-bottom: 0.5rem; 
        }
        .form-group { 
            margin-bottom: 1rem; 
            display: flex; 
            flex-direction: column; 
            gap: 0.5rem; 
        }
        input, button, select { 
            padding: 0.75rem; 
            border-radius: 6px; 
            border: 1px solid #334155; 
            background: #0f172a; 
            color: white; 
            font-size: 1rem; 
            box-sizing: border-box;
            width: 100%;
        }
        button { 
            background: var(--accent); 
            cursor: pointer; 
            font-weight: bold; 
            border: none; 
        }
        button:hover { 
            filter: brightness(1.1); 
        }
        .log-box { 
            background: #090d16; 
            padding: 1rem; 
            border-radius: 6px; 
            height: 250px; 
            overflow-y: auto; 
            font-family: monospace; 
            font-size: 0.9rem; 
        }
        .spot-result {
            margin-top: 1rem; 
            font-weight: bold;
            font-family: monospace;
            padding: 0.5rem;
            background: #090d16;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <h1>Live Engine Configuration Dashboard</h1>

    <div class="grid">
        <div class="card">
            <h2>Track Engine Settings</h2>
            <div class="form-group">
                <label>Primary Ticker Target (sst)</label>
                <input type="text" id="sst" value="NVDA" placeholder="e.g. NVDA">
            </div>
            <div class="form-group">
                <label>Secondary Ticker Target (sst2)</label>
                <input type="text" id="sst2" placeholder="Optional secondary stock">
            </div>
            <div class="form-group">
                <label>Notification Trigger Percentage (%)</label>
                <input type="number" step="0.01" id="p" value="5.00" placeholder="e.g. 5">
            </div>
            <div class="form-group">
                <label>Alert Toggle State</label>
                <select id="browser_notifications_enabled">
                    <option value="true">Enabled</option>
                    <option value="false">Disabled</option>
                </select>
            </div>
            <button id="loopBtn" onclick="toggleTrackingLoop()">Run Notifications</button>
            
            <h2 style="margin-top: 2rem;">Manual Spot Check</h2>
            <button style="background: var(--success);" onclick="spotCheckPrimaryStock()">Check Primary Stock Now</button>
            <div id="spotCheckResult" class="spot-result">Status: Ready to check.</div>
        </div>

        <div class="card">
            <h2>Real-Time Notification Stream</h2>
            <div class="log-box" id="liveAlerts" style="height: 120px; margin-bottom: 1rem;">No real-time triggers yet.</div>

            <h2>Historical Event Logs</h2>
            <div class="log-box" id="logBox">No logged alert data recorded yet. Run loop to begin.</div>
            <button style="margin-top: 1rem; background: #475569;" onclick="clearLogs()">Clear Display Logs</button>
        </div>
    </div>
    <script>
        let trackingInterval = null;
        let isTracking = false;

        if (window.Notification && Notification.permission === "default") { 
            Notification.requestPermission(); 
        }

        async function fetchStockData(ticker) {
            try {
                const targetUrl = `https://yahoo.com{ticker}?interval=1m&range=1d`;
                const proxyUrl = `https://corsproxy.io{encodeURIComponent(targetUrl)}`;
                
                const response = await fetch(proxyUrl, {
                    method: 'GET',
                    headers: { 'Accept': 'application/json' }
                });
                
                if (!response.ok) throw new Error("Server communication roadblock");
                
                const data = await response.json();
                
                if (!data || !data.chart || !data.chart.result || data.chart.result.length === 0) {
                    throw new Error("Bad ticker response format");
                }
                
                const meta = data.chart.result.meta;
                const currentPrice = meta.regularMarketPrice;
                const previousClose = meta.chartPreviousClose;
                
                if (!currentPrice || !previousClose) {
                    throw new Error("Missing active price fields");
                }
                
                const changePercent = ((currentPrice - previousClose) / previousClose) * 100;
                
                return {
                    ticker: ticker.toUpperCase(),
                    price: currentPrice,
                    change: changePercent
                };
            } catch (err) {
                throw new Error("Data parsing failed: " + err.message);
            }
        }

        async function spotCheckPrimaryStock() {
            const sst = document.getElementById('sst').value.toUpperCase().trim();
            const div = document.getElementById('spotCheckResult');
            
            if (!sst) {
                alert("Please specify a primary ticker symbol asset first.");
                return;
            }
            
            div.innerText = "Querying Live Servers...";
            div.style.color = "white";
            
            try {
                const data = await fetchStockData(sst);
                div.innerText = `${data.ticker}: $${data.price.toFixed(2)} USD. 1D Change: ${data.change.toFixed(2)}%`;
                div.style.color = "var(--success)";
            } catch (error) {
                div.innerText = "Error: System security block or invalid ticker.";
                div.style.color = "var(--danger)";
                console.error(error);
            }
        }

        async function checkTickerThreshold(ticker, thresholdPct, alertsEnabled) {
            try {
                const data = await fetchStockData(ticker);
                const ncv = data.change / 100;
                const p = thresholdPct / 100;
                
                let message = null;
                if (ncv > p) {
                    message = `${ticker} is UP by more than ${thresholdPct.toFixed(2)}% (current change: ${(ncv*100).toFixed(2)}%)`;
                } else if (ncv < -p) {
                    message = `${ticker} is DOWN by more than ${thresholdPct.toFixed(2)}% (current change: ${(ncv*100).toFixed(2)}%)`;
                }

                if (message && alertsEnabled) {
                    processTriggeredAlert(message);
                }
            } catch (e) {
                // Fails silently in background checking loops
            }
        }

        function processTriggeredAlert(message) {
            const timestamp = new Date().toLocaleTimeString();
            const logBox = document.getElementById('logBox');
            const liveAlerts = document.getElementById('liveAlerts');

            if (logBox.innerText.includes("No logged alert")) logBox.innerHTML = "";
            if (liveAlerts.innerText.includes("No real-time triggers")) liveAlerts.innerHTML = "";

            const logEntry = `<div>[${timestamp}] ${message}</div>`;
            logBox.innerHTML = logEntry + logBox.innerHTML;
            liveAlerts.innerHTML = logEntry;

            triggerAudioChime();

            if (window.Notification && Notification.permission === "granted") {
                new Notification("Market Trigger Alert", { body: message });
            }
        }

        async function runNotificationEngineLoop() {
            const sst = document.getElementById('sst').value.toUpperCase().trim();
            const sst2 = document.getElementById('sst2').value.toUpperCase().trim();
            const p = parseFloat(document.getElementById('p').value);
            const enabled = document.getElementById('browser_notifications_enabled').value === "true";

            if (sst) await checkTickerThreshold(sst, p, enabled);
            if (sst2) await checkTickerThreshold(sst2, p, enabled);
        }

        function toggleTrackingLoop() {
            const btn = document.getElementById('loopBtn');
            const liveAlerts = document.getElementById('liveAlerts');

            if (isTracking) {
                clearInterval(trackingInterval);
                trackingInterval = null;
                isTracking = false;
                btn.innerText = "Run Notifications";
                btn.style.background = "var(--accent)";
            } else {
                isTracking = true;
                btn.innerText = "Stop Notifications Loop";
                btn.style.background = "var(--danger)";
                liveAlerts.innerText = "Loop engine actively scanning tickers every 20s...";
                
                runNotificationEngineLoop(); 
                trackingInterval = setInterval(runNotificationEngineLoop, 20000); 
            }
        }

        function clearLogs() {
            document.getElementById('logBox').innerHTML = "No logged alert data recorded yet. Run loop to begin.";
            document.getElementById('liveAlerts').innerHTML = "No real-time triggers yet.";
        }

        function triggerAudioChime() {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                const audioCtx = new AudioContext();
                const osc = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                osc.type = 'sine';
                osc.frequency.value = 587.33; 
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime); 
                
                osc.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                osc.start();
                osc.stop(audioCtx.currentTime + 0.15); 
            } catch(e) {
                console.log("Audio pipeline blocked by iPad policy settings.");
            }
        }
    </script>
</body>
</html>
